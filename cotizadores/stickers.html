<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizador Público de Stickers - SINIY</title>

  <style>
    :root {
      --violeta: #5e17eb;
      --violeta-claro: #ede7ff;
      --negro: #1a1a1a;
      --gris: #f5f5f7;
    }

    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      background-color: var(--gris);
      color: var(--negro);
    }

    h1 {
      text-align: center;
      color: var(--violeta);
      margin: 2rem 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .controls input[type="number"] {
      width: 90px;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid var(--violeta);
      border-radius: 6px;
    }

    .controls label {
      font-weight: bold;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.4rem 0.9rem;
      font-size: 1rem;
      background-color: var(--violeta);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .plancha-container {
      position: relative;
      margin-top: 2rem;
    }

    .plancha {
      width: 90vw;
      max-width: 500px;
      aspect-ratio: 1/1;
      background-color: white;
      border: 2px solid var(--violeta);
      display: grid;
      gap: 2px;
      padding: 4px;
    }

    .sticker {
      background-color: var(--violeta);
      border-radius: 4px;
    }

    .guia-horizontal,
    .guia-vertical {
      position: absolute;
      font-size: 0.75rem;
      color: var(--negro);
      font-weight: bold;
    }

    .guia-horizontal {
      top: -2rem;
      left: 50%;
      transform: translateX(-50%);
    }

    .guia-vertical {
      left: -3rem;
      top: 50%;
      transform: rotate(-90deg) translateY(50%);
      transform-origin: left center;
    }

    .info {
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 480px) {
      .controls {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <siniy-header></siniy-header>

  <h1>Simulador y Cotizador de Stickers</h1>

  <div class="controls">
    <div>
      <label>Ancho (cm)</label><br>
      <input type="number" id="ancho" min="1" value="4" oninput="renderStickers()">
    </div>

    <div>
      <label>Alto (cm)</label><br>
      <input type="number" id="alto" min="1" value="4" oninput="renderStickers()">
    </div>

    <div class="qty-controls">
      <label>Cantidad</label>
      <button class="btn" onclick="modificarCantidad(-1)">-</button>
      <input type="number" id="cantidad" min="1" value="100" oninput="renderStickers()">
      <button class="btn" onclick="modificarCantidad(1)">+</button>
    </div>
  </div>

  <div id="workspace" class="workspace"></div>
  <div id="info-total" class="info"></div>

  <siniy-footer></siniy-footer>

  <script src="components.js"></script>

  <script>
    const PRECIO_M2 = 65000;

    function modificarCantidad(delta) {
      const cantidad = document.getElementById("cantidad");
      let val = parseInt(cantidad.value);
      val = Math.max(1, val + delta);
      cantidad.value = val;
      renderStickers();
    }

    function renderStickers() {
      const ancho = parseFloat(document.getElementById("ancho").value);
      const alto = parseFloat(document.getElementById("alto").value);
      const cantidad = parseInt(document.getElementById("cantidad").value);

      const workspace = document.getElementById("workspace");
      const infoTotal = document.getElementById("info-total");

      workspace.innerHTML = "";
      infoTotal.innerHTML = "";

      const stickersPorFila = Math.floor(100 / ancho);
      const stickersPorCol = Math.floor(100 / alto);
      const totalPorPlancha = stickersPorFila * stickersPorCol;
      const planchasNecesarias = Math.ceil(cantidad / totalPorPlancha);

      let totalAreaUtilizada = 0;

      for (let i = 0; i < planchasNecesarias; i++) {
        const planchaContainer = document.createElement("div");
        planchaContainer.className = "plancha-container";

        const plancha = document.createElement("div");
        plancha.className = "plancha";
        plancha.style.gridTemplateColumns = `repeat(${stickersPorFila}, 1fr)`;
        plancha.style.gridTemplateRows = `repeat(${stickersPorCol}, 1fr)`;

        const stickersEnEsta = i === planchasNecesarias - 1
          ? cantidad - (totalPorPlancha * i)
          : totalPorPlancha;

        const filasOcupadas = Math.ceil(stickersEnEsta / stickersPorFila);
        const altoUtilizado = filasOcupadas * alto;
        const anchoUtilizado = stickersPorFila * ancho;

        const guiaH = document.createElement("div");
        guiaH.className = "guia-horizontal";
        guiaH.textContent = `${anchoUtilizado} cm`;

        const guiaV = document.createElement("div");
        guiaV.className = "guia-vertical";
        guiaV.textContent = `${altoUtilizado} cm`;

        planchaContainer.appendChild(guiaH);
        planchaContainer.appendChild(guiaV);
        planchaContainer.appendChild(plancha);

        for (let j = 0; j < stickersEnEsta; j++) {
          const sticker = document.createElement("div");
          sticker.className = "sticker";
          plancha.appendChild(sticker);
        }

        totalAreaUtilizada += (anchoUtilizado * altoUtilizado) / 10000;
        workspace.appendChild(planchaContainer);
      }

      const totalFinal = totalAreaUtilizada * PRECIO_M2;

      infoTotal.innerHTML = `
        Área utilizada: ${totalAreaUtilizada.toFixed(2)} m² 
        | Total a pagar: $${totalFinal.toLocaleString("es-CO")}
      `;
    }

    window.onload = renderStickers;
  </script>

</body>
</html>
