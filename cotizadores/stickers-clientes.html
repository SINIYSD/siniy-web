<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Stickers | SINIY</title>

  <script src="components.js" defer></script>

  <style>
    :root {
      --principal: #5e17eb;
      --gris: #f4f4f4;
      --oscuro: #1a1a1a;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: var(--gris);
      color: var(--oscuro);
    }

    h1 {
      text-align: center;
      color: var(--principal);
      margin-top: 2rem;
    }

    /* Banner */
    .banner-publicidad {
      width: 95%;
      max-width: 1200px;
      height: 120px;
      margin: 25px auto;
      background: linear-gradient(135deg, #5e17eb, #7c3aed);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin: 2rem 1rem;
    }

    .controls div {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .controls input {
      width: 100px;
      padding: 0.5rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      text-align: center;
    }

    /* Simulador */
    .simulador-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }

    .metro {
      width: 90vw;
      max-width: 500px;
      aspect-ratio: 1/1;
      background: white;
      border: 3px solid var(--principal);
      display: grid;
      gap: 2px;
      padding: 4px;
    }

    .sticker {
      background: var(--principal);
      border-radius: 3px;
    }

    .info {
      text-align: center;
      margin-top: 1rem;
      font-weight: bold;
    }

    .resultado {
      text-align: center;
      background: white;
      max-width: 500px;
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .precio {
      font-size: 2rem;
      font-weight: bold;
      color: var(--principal);
      margin-top: 1rem;
    }

    /* WhatsApp */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      font-size: 26px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 999;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

  <siniy-header></siniy-header>

  <div class="banner-publicidad">
    ESPACIO PUBLICITARIO DISPONIBLE
  </div>

  <h1>Calcula tus Stickers por Metro Cuadrado</h1>

  <div class="controls">
    <div>
      <label>Ancho (cm)</label>
      <input type="number" id="ancho" value="4" min="1" oninput="calcular()">
    </div>

    <div>
      <label>Alto (cm)</label>
      <input type="number" id="alto" value="4" min="1" oninput="calcular()">
    </div>

    <div>
      <label>Cantidad</label>
      <input type="number" id="cantidad" value="100" min="1" oninput="calcular()">
    </div>
  </div>

  <div class="simulador-container">
    <div class="metro" id="metro"></div>
  </div>

  <div class="info" id="info"></div>

  <div class="resultado">
    <div>Precio total estimado:</div>
    <div class="precio" id="total">$0</div>
  </div>

  <a id="btnWhatsapp" class="whatsapp-float" target="_blank">💬</a>

  <siniy-footer></siniy-footer>

  <script>
    const PRECIO_M2 = 65000;

    function calcular() {
      const ancho = parseFloat(document.getElementById("ancho").value);
      const alto = parseFloat(document.getElementById("alto").value);
      const cantidad = parseInt(document.getElementById("cantidad").value);
      const metro = document.getElementById("metro");
      const info = document.getElementById("info");

      metro.innerHTML = "";

      if (ancho <= 0 || alto <= 0) return;

      const porFila = Math.floor(100 / ancho);
      const porColumna = Math.floor(100 / alto);
      const totalPorMetro = porFila * porColumna;

      metro.style.gridTemplateColumns = `repeat(${porFila}, 1fr)`;
      metro.style.gridTemplateRows = `repeat(${porColumna}, 1fr)`;

      for (let i = 0; i < totalPorMetro; i++) {
        const div = document.createElement("div");
        div.className = "sticker";
        metro.appendChild(div);
      }

      const areaStickerM2 = (ancho * alto) / 10000;
      const areaTotal = areaStickerM2 * cantidad;
      const total = areaTotal * PRECIO_M2;

      document.getElementById("total").innerText =
        "$" + total.toLocaleString("es-CO");

      info.innerText = `En 1 m² caben aproximadamente ${totalPorMetro} stickers de ${ancho}x${alto} cm`;

      actualizarWhatsapp(ancho, alto, cantidad);
    }

    function actualizarWhatsapp(ancho, alto, cantidad) {
      const total = document.getElementById("total").innerText;
      const mensaje = `Hola SINIY 👋 quiero cotizar stickers de ${ancho}cm x ${alto}cm en cantidad de ${cantidad}. Total estimado: ${total}`;
      const url = `https://wa.me/573237028814?text=${encodeURIComponent(mensaje)}`;
      document.getElementById("btnWhatsapp").href = url;
    }

    window.onload = calcular;
  </script>

</body>
</html>
